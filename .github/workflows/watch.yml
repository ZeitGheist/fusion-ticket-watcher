name: Fusion Ticket Watcher

on:
  schedule:
    - cron: "*/20 * * * *"   # alle ~20 Minuten (GitHub kann unter Last etwas verzögern)
  workflow_dispatch: {}       # erlaubt manuellen Start per Knopf

concurrency:
  group: fusion-watch
  cancel-in-progress: false

permissions:
  contents: write             # nötig, um state.json zurückzuschreiben

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Forum pruefen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node watch.mjs

      - name: Stand sichern (nur bei Aenderung)
        run: |
          git config user.name "fusion-watcher"
          git config user.email "fusion-watcher@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "state: neue Meldung [skip ci]"
            git push
          fi
